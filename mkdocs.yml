site_name: Rust Hardware Playground
theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Overview: index.md
  - Theory of Operation:
    - Processing Element (PE): theory/processing_element.md
    - Pipelined Data Flow: theory/pipelined_flow.md
  - Architecture:
    - Rust / WASM Core: architecture/rust_wasm_core.md
    - Next.js Frontend: architecture/nextjs_frontend.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js
